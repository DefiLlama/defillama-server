<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIM Status</title>
  <style>
    :root {
      --bg:       #0e1117;
      --surface:  #161a26;
      --surface2: #1e2235;
      --surface3: #252a40;
      --border:   #2a2f48;
      --text:     #dde3f0;
      --muted:    #6b7591;
      --accent:   #4d87f5;
      --green:    #34d399;
      --red:      #f87171;
      --yellow:   #fbbf24;
      --green-bg: rgba(52,211,153,.12);
      --red-bg:   rgba(248,113,113,.12);
      --yellow-bg:rgba(251,191,36,.12);
      --accent-bg:rgba(77,135,245,.12);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      height: 100%;
      display: flex; flex-direction: column;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, sans-serif;
      font-size: 13px; line-height: 1.5;
    }

    /* ── Header ── */
    #header {
      flex: none;
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    #header h1 { font-size: 15px; font-weight: 600; }
    #clock { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

    /* ── Run-type tab bar ── */
    #tab-bar {
      flex: none;
      display: flex; gap: 2px; padding: 7px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .run-tab {
      padding: 5px 14px; border-radius: 6px; border: none;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: background .12s, color .12s;
    }
    .run-tab:hover  { background: var(--surface3); color: var(--text); }
    .run-tab.active { background: var(--accent); color: #fff; }

    /* ── Scrollable content ── */
    #content, #tvl-content { flex: 1; overflow-y: auto; padding: 20px; }
    .loading   { color: var(--muted); text-align: center; padding: 60px 20px; font-size: 14px; }
    .err-state { color: var(--red);   text-align: center; padding: 40px 20px; }

    /* ── Stats (always visible) ── */
    .stats-header {
      display: flex; align-items: center; justify-content: flex-end;
      margin-bottom: 8px;
    }
    .gen-time {
      font-size: 11px; color: var(--muted);
    }
    .gen-time .rel { color: var(--accent); margin-left: 6px; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    /* ── Stat chips ── */
    .stats-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px; }
    .stat-chip {
      background: var(--surface2); border-radius: 6px;
      padding: 10px 14px; min-width: 100px;
      border: 1px solid var(--border);
    }
    .stat-chip.success { border-color: rgba(52,211,153,.3); background: var(--green-bg); }
    .stat-chip.danger  { border-color: rgba(248,113,113,.3); background: var(--red-bg); }
    .stat-chip.warn    { border-color: rgba(251,191,36,.3);  background: var(--yellow-bg); }
    .stat-chip.accent  { border-color: rgba(77,135,245,.3);  background: var(--accent-bg); }
    .stat-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 4px; }
    .stat-val { font-size: 22px; font-weight: 700; line-height: 1.1; }
    .stat-chip.success .stat-val { color: var(--green); }
    .stat-chip.danger  .stat-val { color: var(--red); }
    .stat-chip.warn    .stat-val { color: var(--yellow); }
    .stats-divider { width: 1px; background: var(--border); align-self: stretch; margin: 8px 4px; }

    /* ── Sub-section nav (inline, below stats) ── */
    .sub-nav {
      display: flex; align-items: center;
      border-bottom: 1px solid var(--border);
      margin-top: 20px;
    }
    .sub-tab {
      padding: 8px 14px; border: none; border-bottom: 2px solid transparent;
      background: transparent; color: var(--muted);
      font-size: 12px; font-weight: 500; cursor: pointer;
      transition: color .12s, border-color .12s;
      white-space: nowrap;
      margin-bottom: -1px;
    }
    .sub-tab:hover  { color: var(--text); }
    .sub-tab.active { color: var(--text); border-bottom-color: var(--accent); }

    /* ── Sub-section panels ── */
    .sub-panel        { display: none; padding-top: 16px; }
    .sub-panel.active { display: block; }

    /* ── Tables ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--surface2);
      color: var(--muted); font-size: 11px;
      text-transform: uppercase; letter-spacing: .05em;
      padding: 8px 12px; text-align: left;
      white-space: nowrap; user-select: none;
      border-bottom: 1px solid var(--border);
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { color: var(--text); }
    thead th.active { color: var(--accent); }
    .sort-arrow { color: var(--accent); margin-left: 3px; }
    tbody td {
      padding: 7px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface2); }
    .no-data td { text-align: center; color: var(--muted); padding: 24px !important; }

    .err-msg { max-width: 480px; font-size: 12px; color: var(--text); word-break: break-word; line-height: 1.4; }
    .bold { font-weight: 500; }
    .tag {
      display: inline-block; padding: 1px 7px; border-radius: 10px;
      font-size: 10px; font-weight: 500;
      background: var(--accent-bg); color: var(--accent); white-space: nowrap;
    }
    code {
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 11px; background: var(--surface3);
      padding: 1px 5px; border-radius: 3px; cursor: help;
    }
    .empty { padding: 24px; color: var(--muted); text-align: center; }

    /* ── Top-level tab bar ── */
    #top-tab-bar {
      flex: none;
      display: flex; gap: 0; padding: 0 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .top-tab {
      padding: 10px 20px; border: none;
      border-bottom: 2px solid transparent;
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: color .12s, border-color .12s;
      margin-bottom: -1px;
    }
    .top-tab:hover  { color: var(--text); }
    .top-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .top-panel        { display: none; flex-direction: column; flex: 1; min-height: 0; }
    .top-panel.active { display: flex; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 12px 0; flex-wrap: wrap;
    }
    .filter-bar input, .filter-bar select {
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px;
      padding: 6px 10px; font-size: 12px;
      font-family: inherit;
    }
    .filter-bar input:focus, .filter-bar select:focus {
      outline: none; border-color: var(--accent);
    }
    .filter-bar label {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .04em;
    }

    /* ── Collapsible summary ── */
    .collapse-toggle {
      display: flex; align-items: center; gap: 8px;
      width: 100%; padding: 12px 16px; border: none;
      background: var(--surface); color: var(--text);
      font-size: 13px; font-weight: 600; cursor: pointer;
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .collapse-toggle:hover { background: var(--surface2); }
    .collapse-arrow {
      display: inline-block; transition: transform .15s;
      font-size: 11px; color: var(--muted);
    }
    .collapse-toggle.open .collapse-arrow { transform: rotate(90deg); }
    .collapse-body { display: none; }
    .collapse-body.open { display: block; }

    /* ── Expandable error detail ── */
    .err-truncated {
      max-width: 220px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; font-size: 11px; color: var(--red);
      cursor: pointer;
    }
    .err-truncated:hover { color: var(--text); }
    tr.err-detail-row td {
      background: var(--surface2); padding: 10px 16px;
      border-bottom: 1px solid var(--border);
    }
    .err-detail-block { font-size: 11px; line-height: 1.5; }
    .err-detail-block dt {
      color: var(--muted); font-size: 10px; text-transform: uppercase;
      letter-spacing: .04em; margin-top: 8px;
    }
    .err-detail-block dt:first-child { margin-top: 0; }
    .err-detail-block dd {
      color: var(--text); word-break: break-all; white-space: pre-wrap;
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      max-height: 200px; overflow-y: auto;
      background: var(--surface3); padding: 6px 8px; border-radius: 4px;
      margin-top: 2px;
    }
  </style>
</head>
<body>

<div id="header">
  <h1>DIM Status Dashboard</h1>
  <span id="clock"></span>
</div>

<nav id="top-tab-bar">
  <button class="top-tab" data-top="dimensions">Dimensions</button>
  <button class="top-tab" data-top="checks">Checks</button>
  <button class="top-tab" data-top="tvl">TVL</button>
</nav>

<div class="top-panel" id="panel-dimensions">
  <nav id="tab-bar"></nav>
  <main id="content">
    <div id="dim-summary"></div>
    <div id="dim-detail"><div class="loading">Loading…</div></div>
  </main>
</div>

<div class="top-panel" id="panel-checks">
  <main id="checks-content"><div class="loading">Loading…</div></main>
</div>

<div class="top-panel" id="panel-tvl">
  <main id="tvl-content"><div class="loading">Loading…</div></main>
</div>

<script>
'use strict';

const RUN_TYPES = [
  'fees', 'dexs', 'derivatives', 'aggregators', 'options',
  'open-interest',
  'aggregator-derivatives', 'bridge-aggregators', 'normalized-volume',
  'nft-volume', 'active-users', 'new-users',
]

const SUB_SECTIONS = [
  { key: 'errors',        label: 'Failures'            },
  { key: 'long',          label: 'Long Runners'        },
  { key: 'chain',         label: 'Chain Stats'         },
  { key: 'rpc-hash',      label: 'RPC Hash Stats'      },
  { key: 'rpc-chain',     label: 'RPC Chain Stats'     },
  { key: 'rpc-breakdown', label: 'RPC Breakdown'       },
  { key: 'idx-hash',      label: 'Indexer Hash Stats'  },
  { key: 'idx-chain',     label: 'Indexer Chain Stats' },
];

const _cache = {};
let activeRunType = null;
let activeSection = SUB_SECTIONS[0].key;

// ── LocalStorage helpers ──────────────────────────────────────────────────────
const LS_KEYS = { topTab: 'dim-top-tab', runTab: 'dim-run-tab', subSec: 'dim-sub-sec' };
function lsGet(k, fallback) { try { return localStorage.getItem(k) ?? fallback; } catch { return fallback; } }
function lsSet(k, v) { try { localStorage.setItem(k, v); } catch {} }

// ── Fetch ─────────────────────────────────────────────────────────────────────
async function getJson(key) {
  if (!_cache[key]) {
    const r = await fetch(`/cache/${key}`);
    if (!r.ok) throw new Error(`HTTP ${r.status} for ${key}`);
    _cache[key] = await r.json();
  }
  return _cache[key];
}

// ── Formatters ────────────────────────────────────────────────────────────────
function relTime(iso) {
  if (!iso) return '';
  const s = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (s < 60)    return `${s}s ago`;
  if (s < 3600)  return `${Math.floor(s/60)}m ${s%60}s ago`;
  const h = Math.floor(s/3600);
  if (s < 86400) return `${h}h ${Math.floor((s%3600)/60)}m ago`;
  return `${Math.floor(s/86400)}d ago`;
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString(undefined, {
    year:'numeric', month:'short', day:'numeric',
    hour:'2-digit', minute:'2-digit', second:'2-digit',
  });
}

function fmtDurMs(ms) {
  if (ms == null || ms === '') return '—';
  ms = Number(ms);
  if (isNaN(ms)) return '—';
  if (ms < 1000)  return `${ms}ms`;
  if (ms < 60000) return `${(ms/1000).toFixed(1)}s`;
  const m = Math.floor(ms/60000), s = Math.round((ms%60000)/1000);
  return `${m}m ${s}s`;
}

function fmtDurSec(sec) {
  if (sec == null || sec === '') return '—';
  return fmtDurMs(Number(sec) * 1000);
}

function fmtN(n) {
  if (n == null) return '—';
  return Number(n).toLocaleString();
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortHash(h) {
  if (!h) return '—';
  return `${h.slice(0,8)}…${h.slice(-6)}`;
}

function humanTvl(n) {
  if (n == null) return '—';
  n = Number(n);
  if (isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return '$' + (n / 1e9).toFixed(2) + 'B';
  if (abs >= 1e6) return '$' + (n / 1e6).toFixed(2) + 'M';
  if (abs >= 1e3) return '$' + (n / 1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(0);
}

function fmtCacheAge(sec) {
  if (sec == null) return '—';
  sec = Number(sec);
  if (isNaN(sec)) return '—';
  if (sec < 60)      return sec + 's';
  if (sec < 3600)    return Math.floor(sec / 60) + 'm';
  if (sec < 86400)   return Math.floor(sec / 3600) + 'h ' + Math.floor((sec % 3600) / 60) + 'm';
  if (sec < 2592000) { const d = Math.floor(sec / 86400); return d + 'd ' + Math.floor((sec % 86400) / 3600) + 'h'; }
  const months = Math.floor(sec / 2592000);
  const days = Math.floor((sec % 2592000) / 86400);
  return months + 'mo ' + days + 'd';
}

function sluggify(name) {
  return name.toLowerCase().split(' ').join('-').split("'").join('');
}

// ── Sortable table ─────────────────────────────────────────────────────────────
function renderTable(containerId, rows, cols, defaultSortKey, defaultSortDir) {
  const el = document.getElementById(containerId);
  if (!el) return;

  let sortKey = defaultSortKey ?? null;
  let sortDir = defaultSortDir ?? -1;

  function draw() {
    let sorted = rows;
    if (sortKey) {
      const col = cols.find(c => c.key === sortKey);
      sorted = [...rows].sort((a, b) => {
        const av = col?.sortVal ? col.sortVal(a) : (a[sortKey] ?? null);
        const bv = col?.sortVal ? col.sortVal(b) : (b[sortKey] ?? null);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        const cmp = (typeof av === 'number' && typeof bv === 'number')
          ? av - bv
          : String(av).localeCompare(String(bv), undefined, { numeric: true });
        return cmp * sortDir;
      });
    }

    const hdr = cols.map(c => {
      const isActive = c.key === sortKey;
      const arrow = isActive ? `<span class="sort-arrow">${sortDir > 0 ? '↑' : '↓'}</span>` : '';
      return `<th class="sortable${isActive ? ' active' : ''}" data-key="${esc(c.key)}">${esc(c.label)}${arrow}</th>`;
    }).join('');

    const body = sorted.length
      ? sorted.map(row => {
          const cells = cols.map(c => {
            const val = c.render ? c.render(row) : esc(row[c.key] ?? '');
            return `<td>${val}</td>`;
          }).join('');
          return `<tr>${cells}</tr>`;
        }).join('')
      : `<tr class="no-data"><td colspan="${cols.length}">No data</td></tr>`;

    el.innerHTML = `<div class="tbl-wrap"><table>
      <thead><tr>${hdr}</tr></thead>
      <tbody>${body}</tbody>
    </table></div>`;

    el.querySelectorAll('th.sortable').forEach(th => {
      th.addEventListener('click', () => {
        const k = th.dataset.key;
        if (k === sortKey) { sortDir *= -1; }
        else { sortKey = k; sortDir = -1; }
        draw();
      });
    });
  }

  draw();
}

// ── Sub-section switching ──────────────────────────────────────────────────────
function showSection(key) {
  activeSection = key;  lsSet(LS_KEYS.subSec, key);  document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(`panel-${key}`);
  if (panel) panel.classList.add('active');
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));
  const tab = document.querySelector(`.sub-tab[data-sec="${key}"]`);
  if (tab) tab.classList.add('active');
}

// ── Stat chips ────────────────────────────────────────────────────────────────
function chips(arr) {
  return arr.map(([lbl, val, cls]) =>
    `<div class="stat-chip ${cls ?? ''}">
      <div class="stat-lbl">${lbl}</div>
      <div class="stat-val">${val}</div>
    </div>`
  ).join('');
}

function renderAdapterAndRunStats(id, adapterStats, finalRes, run) {
  const el = document.getElementById(id);
  if (!el) return;

  const adapterRows = adapterStats.map(s => `
    <div class="stats-row">
      ${chips([
        ['Adapter Type', esc(s.adapterType),  'accent'],
        ['Started',      fmtN(s.started),      ''],
        ['Finished',     fmtN(s.endCount),      ''],
        ['Skipped',      fmtN(s.skipped),       s.skipped  > 0 ? 'warn'    : ''],
        ['Dead',         fmtN(s.dead),          s.dead     > 0 ? 'danger'  : ''],
        ['Have Data',    fmtN(s.haveData),      s.haveData > 0 ? 'success' : ''],
        ['Running',      fmtN(s.running),       ''],
      ])}
    </div>`
  ).join('');

  const runRow = finalRes?.type ? `
    <div class="stats-row" style="border-top:1px solid var(--border)">
      ${chips([
        ['Succeeded',    fmtN(finalRes.success),         'success'],
        ['Errors',       fmtN(finalRes.errors),          finalRes.errors > 0 ? 'danger' : ''],
        ['Run Time',     fmtDurSec(finalRes.timeTaken),  ''],
      ])}
      <div class="stats-divider"></div>
      ${chips([
        ['Block Queries',  fmtN(run.blockQueryCount),                                        ''],
        ['Queries',        `${fmtN(run.successQueryCount)} / ${fmtN(run.queryCount)}`,       ''],
        ['RPC Queries',    `${fmtN(run.rpcSuccessQueryCount)} / ${fmtN(run.rpcQueryCount)}`, ''],
        ['Indexer Behind', fmtN(run.indexerNotCaughtUpCount), run.indexerNotCaughtUpCount > 0 ? 'warn' : ''],
      ])}
    </div>` : '';

  el.innerHTML = `<div class="card">${adapterRows}${runRow}</div>`;
}

// ── Tab loader ─────────────────────────────────────────────────────────────────
async function loadTab(runType) {
  const detail = document.getElementById('dim-detail');
  detail.innerHTML = '<div class="loading">Loading…</div>';

  try {
    const [run, dim] = await Promise.all([
      getJson(`run-data-${runType}`),
      getJson(`dim-data-${runType}`).catch(() => ({})),
    ]);

    const genTime       = run.generationTime;
    const adapterStats  = run.adapterStats            ?? [];
    const jsonLogs      = run.jsonLogs                ?? [];
    const longRunners   = run.longRunners             ?? [];
    const chainStats    = run.chainStats              ?? [];
    const rpcHashStats  = run.rpcEventHashStats       ?? [];
    const rpcChainStats = run.rpcChainStats           ?? [];
    const rpcBreakdown  = run.rpcChainStatsBreakdownByEventHash ?? {};
    const idxHashStats  = run.indexerEventHashStats   ?? [];
    const idxChainStats = run.indexerChainStats       ?? [];

    const finalRes = jsonLogs.find(l => l.type === 'adapterFinalRes') ?? {};
    const errLogs  = jsonLogs.filter(l => l.type === 'adapterErrors');

    // Flatten errors + enrich with dim-data (protocol name as key)
    const errors = errLogs.flatMap(entry =>
      (entry.errors ?? []).map(e => {
        const d = dim[e.adapter] ?? {};
        return {
          i:            e.i            ?? 0,
          adapter:      e.adapter      ?? '',
          adapterType:  entry.adapterType ?? '',
          chain:        e.chain        ?? '',
          error:        e.error        ?? '',
          category:     d.category     ?? '',
          module:       d.module       ?? '',
          total24h:     d.total24h     ?? null,
          total30d:     d.total30d     ?? null,
          totalAllTime: d.totalAllTime ?? null,
        };
      })
    );

    // Flatten rpcChainStatsBreakdownByEventHash dict → rows
    const rpcBreakdownFlat = Object.entries(rpcBreakdown).flatMap(([hash, chains]) =>
      (Array.isArray(chains) ? chains : []).map(c => ({ hash, ...c }))
    );

    // Sub-section tab labels (with counts where relevant)
    const subDefs = SUB_SECTIONS.map(s => {
      if (s.key === 'errors') return { ...s, label: `Failures (${errors.length})` };
      if (s.key === 'long')   return { ...s, label: `Long Runners (${longRunners.length})` };
      return s;
    });

    // Build content: always-on stats + inline sub-nav + sub-panels
    detail.innerHTML = `
      <div class="stats-header">
        <div class="gen-time">
          ${fmtDate(genTime)}<span class="rel">${relTime(genTime)}</span>
        </div>
      </div>
      <div id="tbl-adapter"></div>

      <div class="sub-nav" id="sub-nav">
        ${subDefs.map(s =>
          `<button class="sub-tab${s.key === activeSection ? ' active' : ''}" data-sec="${esc(s.key)}">${esc(s.label)}</button>`
        ).join('')}
      </div>

      ${subDefs.map(s =>
        `<div class="sub-panel${s.key === activeSection ? ' active' : ''}" id="panel-${esc(s.key)}">
          <div id="tbl-${esc(s.key)}"></div>
        </div>`
      ).join('')}
    `;

    // Wire sub-nav clicks
    document.getElementById('sub-nav').addEventListener('click', e => {
      const btn = e.target.closest('.sub-tab');
      if (btn) showSection(btn.dataset.sec);
    });

    // ── Render stats (always visible) ──
    renderAdapterAndRunStats('tbl-adapter', adapterStats, finalRes, run);

    // ── Render sub-sections ──
    renderTable('tbl-errors', errors, [
      { key: 'i',           label: '#',         sortVal: r => r.i },
      { key: 'adapter',     label: 'Adapter',   render: r => `<span class="bold">${esc(r.adapter)}</span>` },

// ── Init ───────────────────────────────────────────────────────────────────────
function initRunTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = RUN_TYPES.map(rt =>
    `<button class="run-tab" data-tab="${esc(rt)}">${esc(rt)}</button>`
  ).join('');

  bar.addEventListener('click', e => {
    const btn = e.target.closest('.run-tab');
    if (!btn) return;
    const tab = btn.dataset.tab;
    if (tab === activeRunType) return;
    bar.querySelectorAll('.run-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeRunType = tab;
    lsSet(LS_KEYS.runTab, tab);
    loadTab(tab);
  });
}

function initClock() {
  const el = document.getElementById('clock');
  function tick() { if (el) el.textContent = new Date().toLocaleTimeString(); }
  tick();
  setInterval(tick, 1000);
}

// ── Dimensions summary table ───────────────────────────────────────────
let summaryLoaded = false;

async function loadDimSummary() {
  const el = document.getElementById('dim-summary');
  el.innerHTML = '<div class="loading" style="padding:16px">Loading summary…</div>';

  try {
    // Fetch all run data in parallel
    const results = await Promise.allSettled(
      RUN_TYPES.map(rt => getJson(`run-data-${rt}`))
    );

    const summaryRows = RUN_TYPES.map((rt, i) => {
      if (results[i].status !== 'fulfilled') return null;
      const run = results[i].value;
      const stats  = run.adapterStats ?? [];
      const logs   = run.jsonLogs ?? [];
      const finalRes = logs.find(l => l.type === 'adapterFinalRes') ?? {};

      // Aggregate across adapter types within this run
      const started  = stats.reduce((s, a) => s + (a.started  ?? 0), 0);
      const finished = stats.reduce((s, a) => s + (a.endCount ?? 0), 0);
      const skipped  = stats.reduce((s, a) => s + (a.skipped  ?? 0), 0);
      const dead     = stats.reduce((s, a) => s + (a.dead     ?? 0), 0);
      const haveData = stats.reduce((s, a) => s + (a.haveData ?? 0), 0);
      const running  = stats.reduce((s, a) => s + (a.running  ?? 0), 0);

      return {
        runType:  rt,
        started,
        finished,
        success:  finalRes.success  ?? null,
        errors:   finalRes.errors   ?? null,
        skipped,
        dead,
        haveData,
        running,
        runtime:  finalRes.timeTaken != null ? Number(finalRes.timeTaken) : null,
        genTime:  run.generationTime ?? null,
      };
    }).filter(Boolean);

    const collapsed = lsGet('dim-summary-collapsed', 'false') === 'true';

    el.innerHTML = `
      <div class="card" style="margin-bottom:16px">
        <button class="collapse-toggle${collapsed ? '' : ' open'}" id="summary-toggle">
          <span class="collapse-arrow">▶</span>
          All Runs Summary
          <span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px">(${summaryRows.length} types)</span>
        </button>
        <div class="collapse-body${collapsed ? '' : ' open'}" id="summary-body">
          <div id="tbl-dim-summary"></div>
        </div>
      </div>
    `;

    document.getElementById('summary-toggle').addEventListener('click', () => {
      const toggle = document.getElementById('summary-toggle');
      const body   = document.getElementById('summary-body');
      toggle.classList.toggle('open');
      body.classList.toggle('open');
      lsSet('dim-summary-collapsed', !body.classList.contains('open'));
    });

    renderTable('tbl-dim-summary', summaryRows, [
      { key: 'runType',  label: 'Adapter Type', render: r => '<span class="bold">' + esc(r.runType) + '</span>' },
      { key: 'started',  label: 'Started',      sortVal: r => r.started },
      { key: 'finished', label: 'Finished',     sortVal: r => r.finished },
      { key: 'success',  label: 'Success',      render: r => r.success != null ? '<span style="color:var(--green)">' + fmtN(r.success) + '</span>' : '—', sortVal: r => r.success },
      { key: 'errors',   label: 'Errors',       render: r => r.errors  != null ? (r.errors > 0 ? '<span style="color:var(--red)">' + fmtN(r.errors) + '</span>' : '0') : '—', sortVal: r => r.errors },
      { key: 'skipped',  label: 'Skipped',      render: r => r.skipped > 0 ? '<span style="color:var(--yellow)">' + fmtN(r.skipped) + '</span>' : '0', sortVal: r => r.skipped },
      { key: 'dead',     label: 'Dead',         render: r => r.dead    > 0 ? '<span style="color:var(--red)">'    + fmtN(r.dead) + '</span>'    : '0', sortVal: r => r.dead },
      { key: 'haveData', label: 'Have Data',    render: r => r.haveData > 0 ? '<span style="color:var(--green)">' + fmtN(r.haveData) + '</span>' : '0', sortVal: r => r.haveData },
      { key: 'running',  label: 'Running',      sortVal: r => r.running },
      { key: 'runtime',  label: 'Runtime',      render: r => fmtDurSec(r.runtime), sortVal: r => r.runtime },
      { key: 'genTime',  label: 'Generated',    render: r => r.genTime ? relTime(r.genTime) : '—', sortVal: r => r.genTime ? new Date(r.genTime).getTime() : 0 },
    ], 'errors', -1);

    summaryLoaded = true;
  } catch (err) {
    el.innerHTML = '<div class="err-state">Error loading summary: ' + esc(err.message) + '</div>';
    console.error(err);
  }
}

function adapterGithubUrl(adapterType, module) {
  if (!module) return '';
  // Map adapter type to directory name in the repo
  const dirMap = {
    'fees': 'fees', 'dexs': 'dexs', 'derivatives': 'derivatives',
    'aggregators': 'aggregators', 'options': 'options',
    'open-interest': 'dexs', 'aggregator-derivatives': 'aggregator-derivatives',
    'bridge-aggregators': 'bridge-aggregators', 'normalized-volume': 'normalized-volume',
    'nft-volume': 'nft-volume', 'active-users': 'users', 'new-users': 'users',
  };
  const dir = dirMap[adapterType] || adapterType;
  return `${DIM_ADAPTER_BASE}/${dir}/${module}`;
}

            <div class="stats-divider"></div>
            ${chips([
              ['Tweets Pulled', `${String(data.tweetsPulledCount ?? 0)}<div style="font-size:10px;color:var(--muted);margin-top:2px">${esc(data.tweetsPulledDuration ?? '—')}</div>`, Number(data.tweetsPulledCount) > 0 ? 'success' : 'warn'],
            ])}
          </div>
        </div>

        <div id="tvl-cache-section"></div>

        <div class="card" style="margin-top:20px">
          <button class="collapse-toggle open" id="tvl-errors-toggle">
            <span class="collapse-arrow">▶</span>
            Hourly Outdated Protocols
            <span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px">(${outdated.length})</span>
          </button>
          <div class="collapse-body open" id="tvl-errors-body" style="padding:0 16px 16px">
            <div class="filter-bar" id="tvl-filters">
              <label>Search</label>
              <input type="text" id="tvl-filter-name" placeholder="Protocol name…" style="width:180px">
              <label>Category</label>
              <select id="tvl-filter-category">
                <option value="">All</option>
                ${categories.map(c => '<option value="' + esc(c) + '">' + esc(c) + '</option>').join('')}
              </select>
              <label>Min TVL</label>
              <select id="tvl-filter-min-tvl">
                <option value="0">Any</option>
                <option value="1000">$1K</option>
                <option value="10000">$10K</option>
                <option value="100000">$100K</option>
                <option value="1000000" selected>$1M</option>
                <option value="10000000">$10M</option>
                <option value="100000000">$100M</option>
              </select>
              <label>Min Age</label>
              <select id="tvl-filter-min-age">
                <option value="0" selected>Any</option>
                <option value="3600">1 hour</option>
                <option value="21600">6 hours</option>
                <option value="86400">1 day</option>
                <option value="259200">3 days</option>
                <option value="604800">1 week</option>
                <option value="2592000">30 days</option>
              </select>
            </div>
            <div id="tvl-filter-count" style="font-size:11px;color:var(--muted);margin-bottom:8px"></div>
            <div id="tbl-tvl-outdated"></div>
          </div>
        </div>
      </div>
    `;

    // Wire errors collapsible toggle
    document.getElementById('tvl-errors-toggle').addEventListener('click', () => {
      document.getElementById('tvl-errors-toggle').classList.toggle('open');
      document.getElementById('tvl-errors-body').classList.toggle('open');
    });

    // Current filtered+indexed data — shared with the click handler
    let currentIndexed = [];

    // Render with filter support
    function renderTvlTable() {
      const nameFilter = (document.getElementById('tvl-filter-name')?.value ?? '').toLowerCase();
      const catFilter  = document.getElementById('tvl-filter-category')?.value ?? '';
      const minTvl     = Number(document.getElementById('tvl-filter-min-tvl')?.value ?? 0);
      const minAgeSec  = Number(document.getElementById('tvl-filter-min-age')?.value ?? 0);
      const nowSec     = Math.floor(Date.now() / 1000);

      let filtered = outdated;
      if (nameFilter) filtered = filtered.filter(p => p.protocolName.toLowerCase().includes(nameFilter));
      if (catFilter)  filtered = filtered.filter(p => p.category === catFilter);
      if (minTvl > 0) filtered = filtered.filter(p => (p.tvl ?? 0) >= minTvl);
      if (minAgeSec > 0) filtered = filtered.filter(p => p.lastUpdate != null && (nowSec - p.lastUpdate) >= minAgeSec);

      // Add index after filtering
      currentIndexed = filtered.map((r, i) => ({ ...r, _idx: i + 1 }));

      const countEl = document.getElementById('tvl-filter-count');
      if (countEl) countEl.textContent = 'Showing ' + filtered.length + ' of ' + outdated.length + ' protocols';

      renderTable('tbl-tvl-outdated', currentIndexed, [
        { key: '_idx',         label: '#',            sortVal: r => r._idx },
        { key: 'protocolName', label: 'Protocol',    render: r => '<a href="https://defillama.com/protocol/' + encodeURIComponent(r.slug) + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-weight:500">' + esc(r.protocolName) + '</a>', sortVal: r => r.protocolName },
        { key: 'category',     label: 'Category',    render: r => r.category ? '<span class="tag">' + esc(r.category) + '</span>' : '—' },
        { key: 'lastUpdateRel',label: 'Age',          render: r => r.lastUpdate ? relTime(new Date(r.lastUpdate * 1000).toISOString()) : '—', sortVal: r => r.lastUpdate ? -r.lastUpdate : null },
        { key: 'tvl',          label: 'TVL',          render: r => humanTvl(r.tvl), sortVal: r => r.tvl },
        { key: 'chains',       label: 'Top Chains',   render: r => (r.chains ?? []).slice(0, 5).map(c => '<span class="tag" style="margin:1px 2px">' + esc(c) + '</span>').join('') || '', sortVal: r => (r.chains ?? []).length },
        { key: 'errorChains',  label: 'Err Chains',   render: r => (r.errorChains ?? []).slice(0, 3).map(c => '<span class="tag" style="margin:1px 2px;background:var(--red-bg);color:var(--red)">' + esc(c) + '</span>').join('') + ((r.errorChains ?? []).length > 3 ? '<span style="color:var(--muted);font-size:10px"> +' + ((r.errorChains ?? []).length - 3) + '</span>' : '') || '', sortVal: r => (r.errorChains ?? []).length },
        { key: 'errorString',  label: 'Error',        render: r => {
          const err = r.errorString_protocol || r.errorString_tvl || '';
          if (!err) return '';
          const uid = 'err-' + r._idx;
          return '<div class="err-truncated" data-err-id="' + uid + '" title="Click to expand">' + esc(err) + '</div>';
        }, sortVal: r => (r.errorString_protocol || r.errorString_tvl) ? 1 : 0 },
        { key: 'module',       label: 'Code',         render: r => r.module ? '<a href="'+r.module + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:none;font-size:11px">' + r.module.replace('https://github.com/DefiLlama/DefiLlama-Adapters/blob/main/', '').replace('projects/', '') + '</a>' : '' },
      ], 'tvl', -1);
    }

    renderTvlTable();

    // Wire expandable error rows once (reads currentIndexed by reference)
    const tblEl = document.getElementById('tbl-tvl-outdated');
    if (tblEl) {
      tblEl.addEventListener('click', e => {
        const trunc = e.target.closest('.err-truncated');
        if (!trunc) return;
        const uid = trunc.dataset.errId;
        const existing = tblEl.querySelector('tr.err-detail-row[data-for="' + uid + '"]');
        if (existing) { existing.remove(); return; }
        const idx = Number(uid.replace('err-', '')) - 1;
        const row = currentIndexed[idx];
        if (!row) return;
        const errTvl   = row.errorString_tvl || '';
        const errProto = row.errorString_protocol || '';
        const stack    = row.errorStack || '';
        const sKey     = row.error_storedKey || '';
        const colSpan  = tblEl.querySelector('thead tr')?.children.length || 10;
        let dl = '';
        if (errTvl)   dl += '<dt>getTvl Error</dt><dd>' + esc(errTvl) + '</dd>';
        if (errProto) dl += '<dt>Protocol Error</dt><dd>' + esc(errProto) + '</dd>';
        if (stack)    dl += '<dt>Stack Trace</dt><dd>' + esc(stack) + '</dd>';
        if (sKey)     dl += '<dt>Stored Key</dt><dd>' + esc(sKey) + '</dd>';
        const detailRow = document.createElement('tr');
        detailRow.className = 'err-detail-row';
        detailRow.dataset.for = uid;
        detailRow.innerHTML = '<td colspan="' + colSpan + '"><dl class="err-detail-block">' + dl + '</dl></td>';
        const parentTr = trunc.closest('tr');
        if (parentTr && parentTr.nextSibling) {
          parentTr.parentNode.insertBefore(detailRow, parentTr.nextSibling);
        } else if (parentTr) {
          parentTr.parentNode.appendChild(detailRow);
        }
      });
    }

    document.getElementById('tvl-filter-name')?.addEventListener('input', renderTvlTable);
    document.getElementById('tvl-filter-category')?.addEventListener('change', renderTvlTable);
    document.getElementById('tvl-filter-min-tvl')?.addEventListener('change', renderTvlTable);
    document.getElementById('tvl-filter-min-age')?.addEventListener('change', renderTvlTable);

    // ── Cache Usage Logs ──
    loadTvlCacheUsage();

    tvlLoaded = true;
  } catch (err) {
    content.innerHTML = '<div class="err-state">Error loading TVL data: ' + esc(err.message) + '</div>';
    console.error(err);
  }
}

async function loadTvlCacheUsage() {
  try {
    const logs = await getJson('tvl-cache-usage');
    if (!Array.isArray(logs) || !logs.length) return;

    // Flatten: one row per cached item, with parent metadata
    const allRows = logs.flatMap(log => {
      const meta = log.metadata ?? {};
      const data = log.data ?? {};
      return (data.cachedItems ?? []).map(item => ({
        protocolName:   meta.name ?? item.protocolName ?? '',
        protocolId:     meta.id ?? '',
        chain:          item.storeKey ?? '',
        chainTvl:       item.storeKeyTvl ?? 0,
        totalTvl:       item.totalTvl ?? 0,
        cacheAge:       item.cacheTime ? Math.floor(Date.now() / 1000) - item.cacheTime : null,
        invalidCache:   item.invalidCacheTime > 0,
        totalCached:    data.totalCachedItems ?? 0,
        aggregatedTvl:  data.aggregatedTvl ?? 0,
        timeDiff:       data.timeDiffFromNowSeconds ?? null,
        timestamp:      log.timestamp ?? 0,
      }));
    });

    // Retain only the latest log per protocol (by timestamp)
    const latestByProtocol = new Map();
    for (const row of allRows) {
      const key = row.protocolName;
      const existing = latestByProtocol.get(key);
      if (!existing || row.timestamp > existing.timestamp) {
        latestByProtocol.set(key, row);
      }
    }
    const rows = [...latestByProtocol.values()];

    const section = document.getElementById('tvl-cache-section');
    if (!section) return;

    section.innerHTML = `
      <div class="card" style="margin-top:20px">
        <button class="collapse-toggle open" id="cache-usage-toggle">
          <span class="collapse-arrow">▶</span>
          TVL Cache Usage
          <span style="font-weight:400;color:var(--muted);font-size:11px;margin-left:6px">(${rows.length} protocols, last 6h)</span>
        </button>
        <div class="collapse-body open" id="cache-usage-body" style="padding:0 16px 16px">
          <div class="filter-bar">
            <label>Search</label>
            <input type="text" id="cache-filter-name" placeholder="Protocol name…" style="width:180px">
            <label>Chain</label>
            <input type="text" id="cache-filter-chain" placeholder="Chain…" style="width:120px">
            <label>Min Cache Age</label>
            <select id="cache-filter-min-age">
              <option value="0">Any</option>
              <option value="3600">1 hour</option>
              <option value="21600">6 hours</option>
              <option value="36000" selected>10 hours</option>
              <option value="86400">1 day</option>
              <option value="259200">3 days</option>
              <option value="604800">1 week</option>
              <option value="2592000">30 days</option>
            </select>
          </div>
          <div id="cache-filter-count" style="font-size:11px;color:var(--muted);margin-bottom:8px"></div>
          <div id="tbl-tvl-cache-usage"></div>
        </div>
      </div>
    `;

    document.getElementById('cache-usage-toggle').addEventListener('click', () => {
      document.getElementById('cache-usage-toggle').classList.toggle('open');
      document.getElementById('cache-usage-body').classList.toggle('open');
    });

    function renderCacheTable() {
      const nameFilter = (document.getElementById('cache-filter-name')?.value ?? '').toLowerCase();
      const chainFilter = (document.getElementById('cache-filter-chain')?.value ?? '').toLowerCase();
      const minAgeSec = Number(document.getElementById('cache-filter-min-age')?.value ?? 0);

      let filtered = rows;
      if (nameFilter) filtered = filtered.filter(r => r.protocolName.toLowerCase().includes(nameFilter));
      if (chainFilter) filtered = filtered.filter(r => r.chain.toLowerCase().includes(chainFilter));
      if (minAgeSec > 0) filtered = filtered.filter(r => r.cacheAge != null && r.cacheAge >= minAgeSec);

      const countEl = document.getElementById('cache-filter-count');
      if (countEl) countEl.textContent = 'Showing ' + filtered.length + ' of ' + rows.length + ' protocols';

      renderTable('tbl-tvl-cache-usage', filtered, [
        { key: 'protocolName', label: 'Protocol',     render: r => '<span class="bold">' + esc(r.protocolName) + '</span>', sortVal: r => r.protocolName },
        { key: 'protocolId',   label: 'ID',           sortVal: r => Number(r.protocolId) },
        { key: 'chain',        label: 'Chain',        render: r => '<span class="tag">' + esc(r.chain) + '</span>' },
        { key: 'chainTvl',     label: 'Chain TVL',    render: r => humanTvl(r.chainTvl), sortVal: r => r.chainTvl },
        { key: 'totalTvl',     label: 'Total TVL',    render: r => humanTvl(r.totalTvl), sortVal: r => r.totalTvl },
        { key: 'cacheAge',     label: 'Cache Age',    render: r => r.cacheAge != null ? fmtCacheAge(r.cacheAge) : '—', sortVal: r => r.cacheAge },
        { key: 'invalidCache', label: 'Invalid',      render: r => r.invalidCache ? '<span style="color:var(--red)">Yes</span>' : '<span style="color:var(--green)">No</span>', sortVal: r => r.invalidCache ? 1 : 0 },
        { key: 'timestamp',    label: 'Logged',       render: r => r.timestamp ? relTime(new Date(r.timestamp).toISOString()) : '—', sortVal: r => r.timestamp },
      ], 'cacheAge', -1);
    }

    renderCacheTable();

    document.getElementById('cache-filter-name')?.addEventListener('input', renderCacheTable);
    document.getElementById('cache-filter-chain')?.addEventListener('input', renderCacheTable);
    document.getElementById('cache-filter-min-age')?.addEventListener('change', renderCacheTable);

  } catch (err) {
    console.error('Error loading TVL cache usage:', err);
  }
}

// ── Top-level tab switching ─────────────────────────────────────────────────
function switchTopTab(tab) {
  const bar = document.getElementById('top-tab-bar');
  bar.querySelectorAll('.top-tab').forEach(b => b.classList.remove('active'));
  const btn = bar.querySelector(`.top-tab[data-top="${tab}"]`);
  if (btn) btn.classList.add('active');
  document.querySelectorAll('.top-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('panel-' + tab);
  if (panel) panel.classList.add('active');
  lsSet(LS_KEYS.topTab, tab);

  if (tab === 'tvl' && !tvlLoaded) loadTvlTab();
  if (tab === 'checks' && !checksLoaded) loadChecksTab();
  if (tab === 'dimensions' && !summaryLoaded) loadDimSummary();
}

function initTopTabs() {
  const bar = document.getElementById('top-tab-bar');
  bar.addEventListener('click', e => {
    const btn = e.target.closest('.top-tab');
    if (!btn) return;
    switchTopTab(btn.dataset.top);
  });
}

function init() {
  initTopTabs();
  initRunTabs();
  initClock();

  // Restore sub-section from localStorage
  const savedSubSec = lsGet(LS_KEYS.subSec, SUB_SECTIONS[0].key);
  if (SUB_SECTIONS.some(s => s.key === savedSubSec)) activeSection = savedSubSec;

  // Restore run tab from localStorage
  const savedRunTab = lsGet(LS_KEYS.runTab, RUN_TYPES[0]);
  const runTabToLoad = RUN_TYPES.includes(savedRunTab) ? savedRunTab : RUN_TYPES[0];
  const targetBtn = document.querySelector(`.run-tab[data-tab="${runTabToLoad}"]`);
  if (targetBtn) {
    targetBtn.classList.add('active');
    activeRunType = runTabToLoad;
    lsSet(LS_KEYS.runTab, runTabToLoad);
    loadTab(runTabToLoad);
  }

  // Restore top tab from localStorage
  const savedTopTab = lsGet(LS_KEYS.topTab, 'dimensions');
  switchTopTab(['dimensions', 'checks', 'tvl'].includes(savedTopTab) ? savedTopTab : 'dimensions');
}

init();
</script>
